<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat OIO ONE - FB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            /* Cores do Facebook */
            --fb-bg: #f0f2f5; 
            --fb-header: #ffffff; 
            --fb-main-blue: #1877f2; 
            --fb-mine-blue: #0084ff; 
            --fb-other-grey: #e4e6eb; 
            --fb-text: #050505; 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--fb-bg); color: var(--fb-text); overflow: hidden; }
        .header { height: 50px; background: var(--fb-header); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 10; }
        #chat { height: calc(100vh - 120px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 18px; font-size: 15px; }
        .mine { align-self: flex-end; background: var(--fb-mine-blue); color: #fff; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: var(--fb-other-grey); b7order-bottom-left-radius: 4px; }
        .footer { height: 70px; background: var(--fb-header); position: fixed; bottom: 0; width: 100%; display: flex; align-items: center; padding: 0 10px; gap: 8px; box-sizing: border-box; z-index: 20; border-top: 1px solid #ddd; }
        .in { flex: 1; background: #e4e6eb; border: none; border-radius: 20px; padding: 10px 15px; color: var(--fb-text); font-size: 16px; }
        .btn-acc { background: none; border: none; color: var(--fb-main-blue); font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fab fa-facebook-messenger" style="color:var(--fb-main-blue); font-size:24px;"></i>
        <div style="margin-left: 10px;"><b>Chat OIO ONE</b><br><small style="color: var(--fb-main-blue)">ativo</small></div>
    </div>
    <div id="chat"></div>
    <div class="footer">
        <button class="btn-acc"><i class="fas fa-plus-circle"></i></button>
        <button class="btn-acc"><i class="fas fa-camera"></i></button>
        <input type="text" id="input" class="in" placeholder="Aa">
        <button class="btn-acc" id="send"><i class="fas fa-paper-plane"></i></button>
    </div>
    <script>
        var config = { apiKey: "AIzaSyAslIIn6h6NdVhuHdwXjS1EhAbltrAXq7Y", databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        var db = firebase.database().ref("chat_vibe");
        var user = "Michel";

        db.limitToLast(25).on("value", s => {
            const c = document.getElementById('chat'); c.innerHTML = '';
            s.forEach(i => {
                const m = i.val(); const cl = m.nome === user ? 'mine' : 'other';
                c.innerHTML += `<div class="msg ${cl}"><small style="opacity:0.7">${m.nome}</small><br>${m.msg}</div>`;
            });
            c.scrollTop = c.scrollHeight;
        });

        document.getElementById('send').onclick = () => {
            const i = document.getElementById('input');
            if(i.value.trim()){ db.push({ nome: user, msg: i.value, data: Date.now() } i.value = ''; }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0e1621">
    <title>OIO VIBE - Premium</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/glass-theme.css">
    <link rel="stylesheet" href="css/social-twitter.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body id="app-body">

    <div id="dynamic-background"></div>
    <div id="overlay-glass"></div>

    <header class="app-header glass-card">
        <div class="user-profile-mini">
            <img src="media/icons/user-placeholder.png" alt="Perfil" id="header-avatar">
            <h2 id="view-title">Chats</h2>
        </div>
        <div class="header-actions">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <main id="main-content" class="fade-in">
        <div class="loading-spinner"></div>
    </main>

    <button id="btn-plus-social" class="btn-twitter-plus">+</button>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="changeTab('chats', this)">
            <i class="fas fa-comment-alt"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" onclick="changeTab('explore', this)">
            <i class="fas fa-compass"></i>
            <span>Explorar</span>
        </div>
        <div class="nav-item" onclick="changeTab('podcasts', this)">
            <i class="fas fa-microphone-lines"></i>
            <span>Podcasts</span>
        </div>
        <div class="nav-item" onclick="changeTab('profile', this)">
            <i class="fas fa-user-circle"></i>
            <span>Perfil</span>
        </div>
    </nav>

    <script src="js/database.js"></script>
    <script src="js/theme-engine.js"></script>
    <script src="js/app.js"></script>
    <script src="sounds-engine/notify-logic.js"></script>
</body>
</html>

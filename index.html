<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat-mensagens PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#25d366">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body { margin:0; font-family:Arial; background:#0b141a; color:#fff; }
#chat { flex:1; overflow:auto; padding:10px; display:flex; flex-direction:column; }
.msg { max-width:75%; padding:10px; margin:5px; border-radius:12px; }
.me { background:#005c4b; align-self:flex-end; }
.other { background:#202c33; align-self:flex-start; }
.barra { display:flex; gap:10px; padding:10px; background:#202c33; }
input { flex:1; padding:10px; border-radius:20px; border:none; background:#2a3942; color:white; }
.icon { font-size:20px; cursor:pointer; }
.btn { background:#25d366; border:none; width:45px; height:45px; border-radius:50%; color:white; }
</style>
</head>

<body>

<audio id="som" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<div id="chat"></div>

<div class="barra">
  <i class="fa-solid fa-image icon" onclick="abrirGaleria()"></i>
  <i class="fa-solid fa-music icon" onclick="abrirMusica()"></i>
  <i class="fa-solid fa-microphone icon" id="btnAudio"></i>
  <input id="msg" placeholder="Mensagem">
  <button class="btn" onclick="enviar()">➤</button>
</div>

<input type="file" id="fileInput" accept="image/*" hidden>
<input type="file" id="musicInput" accept="audio/*" hidden>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

<script>
// 🔥 FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyAslIIn6h6NdVhuHdwXjS1EhAbItrAXq7Y",
  databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
  storageBucket: "vibe-app-bbba2.appspot.com"
});

var db = firebase.database().ref("chat_vibe");
var storage = firebase.storage();

// USER
var nick = localStorage.getItem("vibe_user") || prompt("Nome:");
localStorage.setItem("vibe_user", nick);

// 🔊 SOM
document.body.onclick = ()=>{
  var s=document.getElementById("som");
  s.play().then(()=>{s.pause();s.currentTime=0;}).catch(()=>{});
};

// RECEBER
db.limitToLast(50).on("child_added", snap => {

  var m = snap.val();
  var chat = document.getElementById("chat");

  var div = document.createElement("div");
  div.className = "msg " + (m.autor === nick ? "me" : "other");

  if(m.tipo === "foto"){
    div.innerHTML = "<img src='"+m.url+"' style='width:100%'>";
  }
  else if(m.tipo === "audio" || m.tipo === "musica"){
    div.innerHTML = "<audio controls src='"+m.url+"'></audio>";
  }
  else{
    div.innerText = m.autor + ": " + m.texto;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(m.autor !== nick){
    document.getElementById("som").play().catch(()=>{});
  }
});

// TEXTO
function enviar(){
  var txt = msg.value;
  if(!txt) return;

  db.push({ autor:nick, texto:txt, tipo:"texto" });
  msg.value="";
}

// 📷 FOTO (UPLOAD REAL)
function abrirGaleria(){
  fileInput.click();
}

fileInput.onchange = async e=>{
  var file = e.target.files[0];

  var ref = storage.ref("fotos/" + Date.now());
  await ref.put(file);

  var url = await ref.getDownloadURL();

  db.push({ autor:nick, url:url, tipo:"foto" });
};

// 🎵 MUSICA (UPLOAD REAL)
function abrirMusica(){
  musicInput.click();
}

musicInput.onchange = async e=>{
  var file = e.target.files[0];

  var ref = storage.ref("musicas/" + Date.now());
  await ref.put(file);

  var url = await ref.getDownloadURL();

  db.push({ autor:nick, url:url, tipo:"musica" });
};

// 🎤 AUDIO (UPLOAD REAL)
var rec;
var chunks=[];

btnAudio.onclick = async function(){

  if(!rec || rec.state==="inactive"){

    var stream = await navigator.mediaDevices.getUserMedia({audio:true});
    rec = new MediaRecorder(stream);
    chunks=[];

    rec.ondataavailable = e=>{
      if(e.data.size>0) chunks.push(e.data);
    };

    rec.onstop = async ()=>{

      var blob = new Blob(chunks,{type:"audio/webm"});

      var ref = storage.ref("audios/" + Date.now());
      await ref.put(blob);

      var url = await ref.getDownloadURL();

      db.push({ autor:nick, url:url, tipo:"audio" });
    };

    rec.start();
    btnAudio.style.color="red";

  } else {

    rec.stop();
    btnAudio.style.color="white";

  }
};
</script>

</body>
</html>

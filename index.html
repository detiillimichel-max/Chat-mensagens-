<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat-mensagens</title>

<!-- Ícones PROFISSIONAIS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0b141a;
  font-family: Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* CHAT */
#chat {
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MENSAGENS */
.msg {
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:12px;
  color:#fff;
}

.me {
  background:#005c4b;
  align-self:flex-end;
}

.other {
  background:#202c33;
  align-self:flex-start;
}

/* BARRA */
.barra {
  display:flex;
  align-items:center;
  padding:10px;
  gap:10px;
  background:#202c33;
}

.icon {
  font-size:20px;
  color:#aaa;
  cursor:pointer;
}

/* INPUT */
input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  outline:none;
}

/* BOTÃO ENVIAR */
.btn-enviar {
  background:#25d366;
  border:none;
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
}
</style>
</head>

<body>

<div id="chat"></div>

<div class="barra">

  <!-- GALERIA -->
  <i class="fa-solid fa-image icon" onclick="abrirGaleria()"></i>

  <!-- ÁUDIO -->
  <i class="fa-solid fa-microphone icon" id="btnAudio"></i>

  <input id="msg" placeholder="Mensagem">

  <!-- ENVIAR -->
  <button class="btn-enviar" onclick="enviar()">
    <i class="fa-solid fa-paper-plane"></i>
  </button>

</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAslIIn6h6NdVhuHdwXjS1EhAbItrAXq7Y",
  databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
  projectId: "vibe-app-bbba2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("chat_vibe");

const nick = localStorage.getItem("vibe_user") || prompt("Seu nome:");

/* ENVIAR TEXTO */
function enviar() {
  if(!msg.value) return;

  db.push({
    autor: nick,
    texto: msg.value,
    tipo: "texto"
  });

  msg.value = "";
}

/* GALERIA REAL */
function abrirGaleria(){
  document.getElementById("fileInput").click();
}

fileInput.onchange = e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    db.push({
      autor: nick,
      imagem: ev.target.result,
      tipo: "foto"
    });
  };
  reader.readAsDataURL(file);
};

/* ÁUDIO REAL */
let mediaRecorder;
let chunks = [];

btnAudio.onclick = async () => {
  if (!mediaRecorder || mediaRecorder.state === "inactive") {

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);

    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks);
      const reader = new FileReader();

      reader.onload = ev => {
        db.push({
          autor: nick,
          audio: ev.target.result,
          tipo: "audio"
        });
      };

      reader.readAsDataURL(blob);
    };

    mediaRecorder.start();
    btnAudio.style.color = "red";

  } else {
    mediaRecorder.stop();
    btnAudio.style.color = "#aaa";
  }
};

/* RECEBER */
db.limitToLast(50).on("child_added", snap => {
  const m = snap.val();

  const div = document.createElement("div");
  div.className = "msg " + (m.autor === nick ? "me" : "other");

  if(m.tipo === "foto"){
    div.innerHTML = `<img src="${m.imagem}" style="width:100%;border-radius:10px;">`;
  }
  else if(m.tipo === "audio"){
    div.innerHTML = `<audio controls src="${m.audio}" style="width:100%"></audio>`;
  }
  else{
    div.innerText = m.autor + ": " + m.texto;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>

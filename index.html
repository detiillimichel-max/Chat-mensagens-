<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Premium</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0e1621;
            --bar-dark: #17212b;
            --accent-blue: #4b8df8;
            --glass: rgba(23, 33, 43, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: sans-serif; background-color: var(--bg-dark);
            background-size: cover; background-position: center; color: white; overflow: hidden;
        }

        /* Header */
        .header {
            height: 60px; background: var(--bar-dark); display: flex;
            align-items: center; padding: 0 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Container de Mensagens */
        #chat-container {
            height: calc(100vh - 130px); overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .bubble {
            max-width: 80%; padding: 10px 15px; border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2); font-size: 15px;
        }
        .mine { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: var(--bar-dark); border-bottom-left-radius: 2px; }

        /* Barra Inferior */
        .footer {
            height: 70px; background: var(--bar-dark); position: fixed; bottom: 0;
            width: 100%; display: flex; align-items: center; padding: 0 10px; gap: 10px;
        }

        .input-box {
            flex: 1; background: #242f3d; border: none; border-radius: 25px;
            padding: 10px 18px; color: white; outline: none; font-size: 16px;
        }

        .btn-icon { background: none; border: none; color: var(--accent-blue); font-size: 24px; cursor: pointer; }

        /* GAVETA DE VIDRO (Bottom Sheet) */
        #drawer {
            position: fixed; bottom: -300px; left: 0; width: 100%; height: 250px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1); border-radius: 25px 25px 0 0;
            transition: bottom 0.3s ease; z-index: 100;
            display: grid; grid-template-columns: repeat(3, 1fr); align-items: center; justify-items: center;
        }

        #drawer.open { bottom: 0; }

        .drawer-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            color: white; font-size: 13px; text-decoration: none;
        }

        .drawer-icon {
            width: 55px; height: 55px; border-radius: 50%; background: var(--accent-blue);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }

        /* Overlay para fechar a gaveta ao clicar fora */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 90;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars"></i>
        <div style="margin-left: 20px;">
            <b>Chat Global</b><br>
            <small style="color: var(--accent-blue)">online</small>
        </div>
        <button onclick="mudarFundo()" style="margin-left: auto; background: none; border: none; color: white; font-size: 18px;"><i class="fas fa-palette"></i></button>
    </div>

    <div id="chat-container">
        <div class="bubble other">Bem-vindo ao novo Chat!</div>
        <div class="bubble mine">Obrigado! O visual está incrível.</div>
    </div>

    <div class="footer">
        <button class="btn-icon" onclick="toggleDrawer()"><i class="fas fa-plus"></i></button>
        <input type="text" class="input-box" placeholder="Mensagem...">
        <button class="btn-icon"><i class="fas fa-microphone"></i></button>
        <button class="btn-icon"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="overlay" onclick="toggleDrawer()"></div>
    <div id="drawer">
        <div class="drawer-item" onclick="document.getElementById('file-input').click()">
            <div class="drawer-icon" style="background: #f0b90b;"><i class="fas fa-folder-open"></i></div>
            <span>Arquivos</span>
        </div>
        <input type="file" id="file-input" hidden>

        <div class="drawer-item" onclick="abrirAgenda()">
            <div class="drawer-icon" style="background: #4b8df8;"><i class="fas fa-address-book"></i></div>
            <span>Contatos</span>
        </div>

        <div class="drawer-item" onclick="mudarFundo()">
            <div class="drawer-icon" style="background: #e91e63;"><i class="fas fa-image"></i></div>
            <span>Fundo</span>
        </div>
    </div>

    <audio id="pop-sound" src="pop.mp3" preload="auto"></audio>

    <script>
        // Carrega wallpaper salvo
        window.onload = () => {
            const bg = localStorage.getItem('chat-bg');
            if(bg) document.body.style.backgroundImage = `url(${bg})`;
        };

        // Abre/Fecha Gaveta
        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('overlay');
            drawer.classList.toggle('open');
            overlay.style.display = drawer.classList.contains('open') ? 'block' : 'none';
        }

        // Função para Mudar o Fundo
        function mudarFundo() {
            const up = document.createElement('input');
            up.type = 'file'; up.accept = 'image/*';
            up.onchange = e => {
                const reader = new FileReader();
                reader.onload = () => {
                    localStorage.setItem('chat-bg', reader.result);
                    document.body.style.backgroundImage = `url(${reader.result})`;
                    toggleDrawer(); // Fecha a gaveta após mudar
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            up.click();
        }

        // Função para Agenda Nativa
        async function abrirAgenda() {
            if ('contacts' in navigator) {
                try {
                    const props = ['name', 'tel'];
                    const contacts = await navigator.contacts.select(props, {multiple: false});
                    if (contacts.length) alert("Selecionado: " + contacts[0].name + " - " + contacts[0].tel[0]);
                } catch (e) { alert("Acesso à agenda negado ou não suportado."); }
            } else {
                alert("Use o app instalado no celular para acessar contatos.");
            }
        }
    </script>
</body>
</html>

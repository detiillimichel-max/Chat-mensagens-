<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat-mensagens</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body { margin:0; font-family:Arial; background:#0b141a; color:#fff; }

/* TELAS */
.screen { display:none; height:100vh; }
.active { display:flex; flex-direction:column; }

/* HEADER */
header {
  padding:15px;
  background:#202c33;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
}

/* LISTA */
#lista { flex:1; overflow:auto; }

.item {
  padding:15px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.item:hover { background:#1a1a1a; }

/* CHAT */
#chat { flex:1; overflow:auto; padding:10px; display:flex; flex-direction:column; }

.msg {
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:12px;
}

.me { background:#005c4b; align-self:flex-end; }
.other { background:#202c33; align-self:flex-start; }

/* INPUT */
.barra {
  display:flex;
  padding:10px;
  gap:10px;
  background:#202c33;
  align-items:center;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.icon { cursor:pointer; }

.btn {
  background:#25d366;
  border:none;
  width:45px;
  height:45px;
  border-radius:50%;
  color:#fff;
}
</style>
</head>

<body>

<audio id="som" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- LISTA -->
<div id="listaScreen" class="screen active">
  <header>Conversas</header>
  <div id="lista"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <header>
    <i class="fa-solid fa-arrow-left" onclick="voltar()"></i>
    <span id="nomeChat">Chat</span>
  </header>

  <div id="chat"></div>

  <div class="barra">
    <i class="fa-solid fa-camera icon" onclick="abrirGaleria()"></i>
    <i class="fa-solid fa-microphone icon" id="btnAudio"></i>

    <input id="msg" placeholder="Mensagem">

    <button class="btn" onclick="enviar()">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAslIIn6h6NdVhuHdwXjS1EhAbItrAXq7Y",
  databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
  projectId: "vibe-app-bbba2"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const nick = localStorage.getItem("vibe_user") || prompt("Seu nome:");

let chatAtual = "global";

/* LISTA */
function carregarLista(){
  const lista = document.getElementById("lista");

  const div = document.createElement("div");
  div.className = "item";
  div.innerHTML = "💬 Chat Global";
  div.onclick = () => abrirChat("global");

  lista.appendChild(div);
}

carregarLista();

/* ABRIR CHAT */
function abrirChat(id){
  chatAtual = id;

  listaScreen.classList.remove("active");
  chatScreen.classList.add("active");

  chat.innerHTML = "";

  db.ref("chat_vibe").limitToLast(50).on("child_added", snap=>{
    const m = snap.val();

    const div = document.createElement("div");
    div.className = "msg " + (m.autor === nick ? "me":"other");

    if(m.tipo === "foto"){
      div.innerHTML = `<img src="${m.imagem}" style="width:100%">`;
    }
    else if(m.tipo === "audio"){
      div.innerHTML = `<audio controls src="${m.audio}"></audio>`;
    }
    else{
      div.innerText = m.autor + ": " + m.texto;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    if(m.autor !== nick){
      document.getElementById("som").play().catch(()=>{});
    }
  });
}

/* VOLTAR */
function voltar(){
  chatScreen.classList.remove("active");
  listaScreen.classList.add("active");
}

/* ENVIAR */
function enviar(){
  if(!msg.value) return;

  db.ref("chat_vibe").push({
    autor: nick,
    texto: msg.value,
    tipo:"texto"
  });

  msg.value="";
}

/* FOTO */
function abrirGaleria(){
  fileInput.click();
}

fileInput.onchange = e=>{
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ev=>{
    db.ref("chat_vibe").push({
      autor: nick,
      imagem: ev.target.result,
      tipo:"foto"
    });
  };

  reader.readAsDataURL(file);
};

/* AUDIO */
let recorder;
let chunks=[];

btnAudio.onclick = async ()=>{

  if(!recorder || recorder.state==="inactive"){

    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recorder = new MediaRecorder(stream);
    chunks=[];

    recorder.ondataavailable = e=>chunks.push(e.data);

    recorder.onstop = ()=>{
      const blob = new Blob(chunks);
      const reader = new FileReader();

      reader.onload = ev=>{
        db.ref("chat_vibe").push({
          autor: nick,
          audio: ev.target.result,
          tipo:"audio"
        });
      };

      reader.readAsDataURL(blob);
    };

    recorder.start();
    btnAudio.style.color="red";

  }else{
    recorder.stop();
    btnAudio.style.color="#fff";
  }
};
</script>

</body>
</html>

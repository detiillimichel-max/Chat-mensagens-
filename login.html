<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body { display:flex; justify-content:center; align-items:center; height:100vh; background:#0b141a; color:white; font-family:Arial;}
.card { background:#202c33; padding:30px; border-radius:15px; width:300px;}
input,button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:10px;}
button { background:#25d366; color:white;}
</style>
</head>
<body>

<div class="card">
<h2>Entrar</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="cadastro()">Criar Conta</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey: "AIzaSyAslIIn6h6NdVhuHdwXjS1EhAbItrAXq7Y",
 authDomain: "vibe-app-bbba2.firebaseapp.com"
});

const auth = firebase.auth();

function login(){
 auth.signInWithEmailAndPassword(email.value, senha.value)
 .then(()=>location.href="index.html")
 .catch(e=>alert(e.message));
}

function cadastro(){
 auth.createUserWithEmailAndPassword(email.value, senha.value)
 .then(()=>alert("Conta criada!"))
 .catch(e=>alert(e.message));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe OIO</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="topbar">
    <div class="user">
        <img id="userAvatar">
        <div>
            <strong id="userName">Vibe</strong>
            <span class="status">online</span>
        </div>
    </div>
</div>

<div id="chat"></div>

<div class="barra">

<button class="icon-btn" id="btnFoto">
<span class="material-symbols-rounded">photo</span>
</button>

<button class="icon-btn" id="btnAudio">
<span class="material-symbols-rounded">mic</span>
</button>

<input id="msgInput" placeholder="Digite uma mensagem...">

<button class="icon-btn" onclick="abrirGaveta()">
<span class="material-symbols-rounded">add</span>
</button>

<button class="send-btn" id="btnEnviar">
<span class="material-symbols-rounded">send</span>
</button>

</div>

<div id="gaveta-ehub" class="gaveta-container">
<div class="handle-area" onclick="fecharGaveta()">
<div class="handle-bar"></div>
</div>

<div class="grid-apps">

<div onclick="galeriaHub()" class="app-item">
<span class="material-symbols-rounded">photo_library</span>
</div>

<div onclick="abrirAppHub('google')" class="app-item">
<span class="material-symbols-rounded">search</span>
</div>

<div onclick="abrirAppHub('jogos')" class="app-item">
<span class="material-symbols-rounded">sports_esports</span>
</div>

</div>
</div>

<input type="file" id="fotoInput" hidden>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script src="js/script.js"></script>
<script src="app/ehub_logic.js"></script>

</body>
</html>

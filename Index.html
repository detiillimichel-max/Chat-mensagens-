<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat OIO ONE</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #fff; padding: 15px; border-bottom: 1px solid #ddd; color: #1877f2; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 18px; max-width: 70%; font-size: 15px; }
        .mine { align-self: flex-end; background: #0084ff; color: white; }
        .other { align-self: flex-start; background: #e4e6eb; color: black; }
        #footer { background: #fff; padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; border: none; background: #f0f2f5; padding: 10px; border-radius: 20px; outline: none; }
        button { background: none; border: none; color: #1877f2; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header">Messenger OIO ONE</div>
    <div id="chat"></div>
    <div id="footer">
        <input type="text" id="input" placeholder="Escreva uma mensagem...">
        <button id="send">Enviar</button>
    </div>

    <script>
        // Configuração tirada do seu código
        var config = { 
            apiKey: "AIzaSyAslIIn6h6NdVhuHdwXjS1EhAbltrAXq7Y", 
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(config);
        var db = firebase.database().ref("chat_vibe");
        var user = "Michel";

        // Ler mensagens
        db.limitToLast(20).on("value", snapshot => {
            const chat = document.getElementById('chat');
            chat.innerHTML = "";
            snapshot.forEach(item => {
                const m = item.val();
                const tipo = m.nome === user ? "mine" : "other";
                chat.innerHTML += `<div class="msg ${tipo}">${m.msg}</div>`;
            });
            chat.scrollTop = chat.scrollHeight;
        });

        // Enviar mensagem
        document.getElementById('send').onclick = () => {
            const inp = document.getElementById('input');
            if(inp.value.trim()){
                db.push({ nome: user, msg: inp.value });
                inp.value = "";
            }
        };
    </script>
</body>
</html>

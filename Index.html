<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - OIO ONE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --fb-blue: #0084ff; 
            --fb-bg: #ffffff; 
            --msg-other: #e4e6eb; 
            --text-main: #050505;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--fb-bg); color: var(--text-main); overflow: hidden; }
        
        .header { 
            height: 60px; background: #fff; display: flex; align-items: center; 
            padding: 0 16px; border-bottom: 1px solid rgba(0,0,0,0.1); position: sticky; top: 0;
        }
        .header b { font-size: 20px; letter-spacing: -0.5px; }

        #chat { 
            height: calc(100vh - 130px); overflow-y: auto; padding: 10px 16px; 
            display: flex; flex-direction: column; gap: 4px; 
        }

        .msg { max-width: 70%; padding: 8px 12px; border-radius: 18px; font-size: 15px; margin: 2px 0; position: relative; display: flex; flex-direction: column; }
        .mine { align-self: flex-end; background: var(--fb-blue); color: white; border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: var(--msg-other); color: black; border-bottom-left-radius: 4px; }
        
        .name { font-size: 11px; color: #65676b; margin-bottom: 2px; margin-left: 12px; }
        
        /* Estilo do Horário */
        .time { font-size: 10px; opacity: 0.7; margin-top: 4px; align-self: flex-end; }
        .other .time { color: #65676b; }
        .mine .time { color: rgba(255,255,255,0.9); }

        .footer { 
            height: 70px; background: #fff; position: fixed; bottom: 0; width: 100%; 
            display: flex; align-items: center; padding: 0 12px; gap: 12px;
        }

        .input-container {
            flex: 1; background: #f0f2f5; border-radius: 20px; display: flex; align-items: center; padding: 8px 12px;
        }

        .in { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; color: var(--text-main); }
        .btn-fb { background: none; border: none; color: var(--fb-blue); font-size: 24px; cursor: pointer; padding: 0; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fab fa-facebook-messenger" style="color: var(--fb-blue); font-size: 30px; margin-right: 12px;"></i>
        <b>Chats</b>
    </div>

    <div id="chat"></div>

    <div class="footer">
        <button class="btn-fb"><i class="fas fa-plus-circle"></i></button>
        <div class="input-container">
            <input type="text" id="input" class="in" placeholder="Aa">
        </div>
        <button class="btn-fb" id="send"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        var config = { 
            apiKey: "AIzaSyAslIIn6h6NdVhuHdwXjS1EhAbltrAXq7Y", 
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" 
        };
        
        if (!firebase.apps.length) firebase.initializeApp(config);
        var db = firebase.database().ref("mensagens_vibe");
        var user = "Michel";

        db.limitToLast(40).on("value", snapshot => {
            const container = document.getElementById('chat');
            container.innerHTML = '';
            snapshot.forEach(item => {
                const data = item.val();
                const isMine = data.nome === user;
                const type = isMine ? 'mine' : 'other';
                
                // Formata o horário
                const hora = data.time ? new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';

                let nameTag = !isMine ? `<div class="name">${data.nome}</div>` : '';
                container.innerHTML += `
                    ${nameTag}
                    <div class="msg ${type}">
                        ${data.msg}
                        <span class="time">${hora}</span>
                    </div>`;
            });
            container.scrollTop = container.scrollHeight;
        });

        document.getElementById('send').onclick = () => {
            const input = document.getElementById('input');
            if (input.value.trim() !== "") {
                db.push({ 
                    nome: user, 
                    msg: input.value, 
                    time: Date.now() // Aqui salva o horário atual
                });
                input.value = '';
            }
        };

        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send').click();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0e1621">
    <title>OIO Vibe</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/glass-theme.css">
    <link rel="stylesheet" href="css/social-twitter.css">
    
    <link rel="manifest" href="manifest.json">
</head>
<body id="app-body">
    <div id="dynamic-background"></div>
    <div id="overlay-glass"></div>

    <header class="app-header">
        <h2 id="view-title">Chats</h2>
        <div class="header-actions">
            <span class="icon-search">🔍</span>
        </div>
    </header>

    <main id="main-content">
        </main>

    <button id="btn-plus-social" class="btn-twitter-plus">+</button>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="changeTab('chats')">
            <i class="icon-chat"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" onclick="changeTab('explore')">
            <i class="icon-explore"></i>
            <span>Explorar</span>
        </div>
        <div class="nav-item" onclick="changeTab('podcasts')">
            <i class="icon-mic"></i>
            <span>Podcasts</span>
        </div>
        <div class="nav-item" onclick="changeTab('profile')">
            <i class="icon-user"></i>
            <span>Perfil</span>
        </div>
    </nav>

    <script src="js/database.js"></script>
    <script src="js/theme-engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

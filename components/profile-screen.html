<div class="profile-page fade-in">
    <div class="profile-header">
        <div class="main-avatar" onclick="document.getElementById('profileUpload').click()">
            <span id="avatarInitials">MD</span>
            <img id="profileDisplay" src="" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
            <div class="edit-badge"><i class="fas fa-camera"></i></div>
            <input type="file" id="profileUpload" hidden accept="image/*" onchange="previewImage(this)">
        </div>
        <h2 class="user-name">Michel Detilli</h2>
        <span class="user-status">online</span>
    </div>

    <div class="security-card">
        <i class="fas fa-shield-alt"></i>
        <div>
            <span>Segurança da Conta</span>
            <p>Protegido com senha de 4 dígitos</p>
        </div>
        <button onclick="changePin()">Alterar PIN</button>
    </div>

    <div class="action-grid">
        <div class="action-card" onclick="document.getElementById('profileUpload').click()">
            <i class="fas fa-camera"></i>
            <span>Definir Foto</span>
        </div>
        <div class="action-card" onclick="editInfo()">
            <i class="fas fa-pen"></i>
            <span>Editar Nome</span>
        </div>
        <div class="action-card" onclick="openSettings()">
            <i class="fas fa-cog"></i>
            <span>Ajustes</span>
        </div>
    </div>

    <div class="info-section">
        <div class="info-item">
            <span class="info-label">Celular</span>
            <p class="info-value">+55 (11) 97479-0494</p>
        </div>
    </div>

    <div class="profile-tabs">
        <button class="tab-btn active">Posts</button>
        <button class="tab-btn">Arquivados</button>
    </div>

    <div class="empty-state">
        <i class="fas fa-th-large"></i>
        <h3>Nenhum post ainda...</h3>
        <button class="btn-add-post">
            <i class="fas fa-camera"></i> Adicione um post
        </button>
    </div>
</div>

<style>
    /* Estilos baseados no seu print de luxo */
    .profile-page { padding: 20px; color: white; background: #0e1621; min-height: 100vh; }
    .profile-header { text-align: center; margin-bottom: 25px; padding-top: 20px; }
    
    .main-avatar {
        width: 110px; height: 110px; 
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        border-radius: 50%; margin: 0 auto 15px; display: flex;
        align-items: center; justify-content: center; font-size: 36px; font-weight: bold;
        position: relative; cursor: pointer; border: 3px solid rgba(255,255,255,0.1);
    }
    
    .edit-badge {
        position: absolute; bottom: 5px; right: 5px;
        background: #2481cc; width: 32px; height: 32px;
        border-radius: 50%; display: flex; align-items: center;
        justify-content: center; font-size: 14px; border: 3px solid #0e1621;
    }

    .security-card {
        background: rgba(36, 129, 204, 0.1); border: 1px solid rgba(36, 129, 204, 0.2);
        border-radius: 12px; padding: 12px 15px; margin-bottom: 20px;
        display: flex; align-items: center; gap: 15px;
    }
    .security-card i { color: #2481cc; font-size: 20px; }
    .security-card span { font-size: 13px; font-weight: bold; display: block; }
    .security-card p { margin: 0; font-size: 11px; color: #808d97; }
    .security-card button { 
        margin-left: auto; background: none; border: 1px solid #2481cc; 
        color: #2481cc; border-radius: 5px; padding: 5px 10px; font-size: 11px;
    }

    /* Reaproveitando seus estilos anteriores de grade e botões */
    .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .action-card { background: #1c2733; padding: 15px 5px; border-radius: 12px; text-align: center; }
    .info-section { background: #1c2733; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
    .tab-btn.active { background: #2b3948; color: white; border-radius: 8px; }
</style>

<script>
    // Função para o preview imediato da foto
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profileDisplay').src = e.target.result;
                document.getElementById('profileDisplay').style.display = 'block';
                document.getElementById('avatarInitials').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

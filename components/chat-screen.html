<div id="chat" class="chat-messages"></div>

<div class="vibe-footer glass">
    <i class="fas fa-camera icon" id="btnFoto" onclick="abrirGaleria()"></i>
    <i class="fas fa-microphone icon" id="id="btnAudio" onclick="toggleAudio()"></i>
    
    <div class="input-container">
        <input type="text" id="msgInput" placeholder="Sua vibe..." onkeypress="if(event.key=='Enter') enviar()">
    </div>

    <i class="fas fa-paper-plane icon send" onclick="enviar()"></i>
    <input type="file" id="fotoInput" style="display:none" onchange="enviarFoto(event)" accept="image/*">
</div>

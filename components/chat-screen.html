<div class="chat-wrapper">
    <div id="chat" class="chat-messages-area"></div>

    <div class="footer-controls glass">
        <button id="btnFoto" class="icon-btn"><i class="fas fa-camera"></i></button>
        <button id="btnAudio" class="icon-btn"><i class="fas fa-microphone"></i></button>
        
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Sua vibe..." autocomplete="off">
        </div>

        <button id="btnEnviar" class="icon-btn send"><i class="fas fa-paper-plane"></i></button>
    </div>
    
    <input type="file" id="fotoInput" style="display:none" accept="image/*">
</div>

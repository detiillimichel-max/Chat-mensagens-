<div class="chat-wrapper">
    <div class="chat-header">
        <div class="user-info">
            <i class="fas fa-arrow-left" onclick="backToMessages()"></i>
            <div class="chat-avatar-mini">IR</div>
            <div>
                <h4>Ivan Ramos</h4>
                <span class="status">visto recentemente</span>
            </div>
        </div>
        <div class="header-actions">
            <i class="fas fa-phone-alt" onclick="startVoiceCall()"></i>
            <i class="fas fa-video" onclick="startVideoCall()"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>

        <div class="input-wrapper">
            <input type="text" placeholder="Mensagem" id="msgInput">
            <i class="far fa-smile"></i>
        </div>
        <div class="action-btn" id="mainActionBtn">
            <i class="fas fa-microphone" id="micIcon"></i>
        </div>
    </div>
</div>

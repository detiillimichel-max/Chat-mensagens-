<div class="wallpaper-modal fade-in-up">
    <div class="wallpaper-preview">
        <img id="previewImg" src="media/default-bg.jpg" alt="Preview">
        <div class="preview-overlay">
            <div class="mock-bubble sent">Fica lindo com este fundo!</div>
            <div class="mock-bubble received">Concordo, Michel!</div>
        </div>
    </div>
    
    <div class="wallpaper-controls">
        <div class="control-group">
            <label><input type="checkbox" id="blurEffect"> Desfocado (Blurred)</label>
            <label><input type="checkbox" id="motionEffect"> Movimento (Motion)</label>
        </div>
        
        <button class="btn-apply-me">Aplicar para Mim</button>
        <button class="btn-apply-both">Aplicar para Ambos (Premium)</button>
    </div>
</div>
